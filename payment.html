<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
projectId:"berkoar-6fc3a"
});

const db=getFirestore(app);

let list=document.getElementById("listPayment");

async function load(){
let snap=await getDocs(collection(db,"payment"));
list.innerHTML="";
snap.forEach(d=>{
let p=d.data();
let div=document.createElement("div");
div.className="box";
div.innerHTML=`<p>${p.nomor}</p>`;
list.appendChild(div);
});
}

load();
</script>
