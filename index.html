<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berkoar</title><style>
body {
  margin: 0;
  background: #000;
  font-family: monospace;
  color: white;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.container {
  text-align: center;
  margin-top: 60px;
}

.title {
  font-size: 28px;
  margin-bottom: 30px;
}

.box {
  border: 2px solid #888;
  border-radius: 12px;
  padding: 20px;
  margin: 15px auto;
  width: 80%;
  max-width: 400px;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.25s ease;
}

.box:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.08);
}

.box:active {
  transform: scale(0.95);
}

.info {
  font-size: 12px;
  padding: 20px;
  text-align: center;
}

.divider {
  width: 80%;
  height: 1px;
  background: #444;
  margin: 20px auto;
}

footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-bottom: 80px;
}

.fab {
  position: fixed;
  bottom: 40px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid #888;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  cursor: pointer;
  background: #000;
  transition: 0.3s;
}

.fab:hover {
  transform: scale(1.1) rotate(90deg);
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
}

.popup {
  width: 85%;
  max-width: 320px;
  background: #111;
  border: 2px solid #888;
  border-radius: 12px;
  padding: 20px;
  animation: zoomIn 0.25s ease;
}

@keyframes zoomIn {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.close {
  text-align: right;
  cursor: pointer;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  background: #000;
  border: 1px solid #555;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #222;
  border: 1px solid #888;
  color: white;
}

/* 🔥 LOADING */
#loading {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #555;
  border-top:5px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.success {
  font-size: 18px;
  color: #0f0;
  animation: fadeIn 0.3s ease;
}
</style></head><body><div class="container">
  <div class="title">Ingin Berkoar</div>  <div class="box" onclick="bukaAkun()">Akun HB</div>
  <div class="box" onclick="bukaPayment()">Payment Tukang HB</div>
  <div class="box" onclick="bukaSawer()">Sawer Admin</div>
</div><div class="info">
  <p>PERHATIAN (WARNING)</p>
  <p>SAYA HANYA BIKIN WEBSITE</p>
  <p>SEMUA DATA AKUN DAN PAYMENT ADALAH KALIAN YANG NGISI</p>
</div><div class="divider"></div>
<footer>FUHH 2026</footer><div class="fab" onclick="bukaPopup()">+</div><!-- 🔥 LOADING --><div id="loading">
  <div class="spinner"></div>
  <p id="loadingText" style="margin-top:15px;">Mengirim data...</p>
</div><!-- popup pilihan --><div id="popupPilihan" class="overlay">
  <div class="popup">
    <div class="close" onclick="tutup()">✕</div>
    <div class="box" onclick="pilihAkun()">Tambahkan Akun HB</div>
    <div class="box" onclick="pilihPayment()">Tambahkan Payment Tukang HB</div>
  </div>
</div><!-- popup akun --><div id="popupAkun" class="overlay">
  <div class="popup">
    <div class="close" onclick="kembali()">✕</div>
    <input type="text" id="id" placeholder="ID">
    <input type="text" id="server" placeholder="Server">
    <input type="file" id="foto">
    <button onclick="simpanAkun()">Simpan</button>
  </div>
</div><!-- popup payment --><div id="popupPayment" class="overlay">
  <div class="popup">
    <div class="close" onclick="kembali()">✕</div>
    <input type="text" id="noPayment" placeholder="No E-Wallet / Rekening">
    <button onclick="simpanPayment()">Simpan</button>
  </div>
</div><!-- popup sawer --><div id="popupSawer" class="overlay">
  <div class="popup">
    <div class="close" onclick="tutup()">✕</div>
    <p style="text-align:center;">SUPPORT ADMIN</p>
    <img src="qris.png" style="width:100%; margin-top:10px; border-radius:10px;">
    <a href="https://saweria.co/F3br1z" target="_blank">
      <button>Kirim Saweran 💸</button>
    </a>
  </div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  projectId: "berkoar-6fc3a",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastPopup = null;

window.tampil = function(id){
  document.querySelectorAll(".overlay").forEach(e => e.style.display="none");
  document.getElementById(id).style.display="flex";
}

window.bukaPopup = ()=> tampil("popupPilihan");
window.pilihAkun = ()=> tampil("popupAkun");
window.pilihPayment = ()=> tampil("popupPayment");
window.kembali = ()=> tampil("popupPilihan");
window.tutup = ()=> document.querySelectorAll(".overlay").forEach(e=>e.style.display="none");

/* 🔥 SIMPAN AKUN REAL */
window.simpanAkun = function(){
  let id = document.getElementById("id").value;
  let server = document.getElementById("server").value;
  let file = document.getElementById("foto").files[0];

  if(!id || !server || !file) return alert("Isi semua!");

  if(file.size > 1024 * 1024){
    alert("Gambar maksimal 1MB!");
    return;
  }

  document.getElementById("loading").style.display = "flex";
  document.getElementById("loadingText").innerText = "Uploading...";

  let reader = new FileReader();

  reader.onload = async function(e){
    try{
      await addDoc(collection(db,"akun"),{
        id:id,
        server:server,
        kode:id+server,
        foto:e.target.result
      });

      document.querySelector(".spinner").style.display = "none";
      document.getElementById("loadingText").innerHTML = "✅ Berhasil disimpan!";
      document.getElementById("loadingText").classList.add("success");

      setTimeout(()=>{
        window.location.href="akun.html";
      }, 1000);

    }catch(err){
      alert("Gagal upload!");
      document.getElementById("loading").style.display="none";
    }
  };

  reader.onerror = function(){
    alert("Gagal baca gambar!");
    document.getElementById("loading").style.display="none";
  };

  reader.readAsDataURL(file);
}

/* PAYMENT */
window.simpanPayment = async function(){
  let no = document.getElementById("noPayment").value;

  if(!no) return alert("Isi dulu!");

  await addDoc(collection(db,"payment"),{
    nomor:no,
    kode:no.replace(/\s/g,'')
  });

  window.location.href="payment.html";
}

window.bukaAkun = ()=> location.href="akun.html";
window.bukaPayment = ()=> location.href="payment.html";
window.bukaSawer = ()=> tampil("popupSawer");
</script></body>
</html>
