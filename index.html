<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berkoar</title><style>
body{margin:0;background:#000;color:white;font-family:monospace;text-align:center;}
.box{border:2px solid #888;margin:15px auto;padding:15px;border-radius:10px;width:90%;max-width:400px;}
.fab{position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;border:2px solid #888;display:flex;align-items:center;justify-content:center;font-size:28px;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);}
.popup{width:90%;max-width:320px;background:#111;border:2px solid #888;padding:20px;border-radius:10px;}
input,button{width:100%;padding:10px;margin-top:10px;background:#000;border:1px solid #555;color:white;}
</style></head><body><h2>Berkoar</h2><div class="box" onclick="bukaAkun()">Akun HB</div>
<div class="box" onclick="bukaPayment()">Payment Tukang HB</div>
<div class="box" onclick="bukaSawer()">Sawer Admin</div><div class="fab" onclick="tampil('pilih')">+</div><!-- pilihan --><div id="pilih" class="overlay">
<div class="popup">
<div onclick="tutup()">✕</div>
<div class="box" onclick="tampil('akunPop')">Tambah Akun</div>
<div class="box" onclick="tampil('payPop')">Tambah Payment</div>
</div>
</div><!-- akun --><div id="akunPop" class="overlay">
<div class="popup">
<div onclick="tutup()">✕</div>
<input id="id" placeholder="ID">
<input id="server" placeholder="Server">
<input type="file" id="foto">
<button onclick="simpanAkun()">Simpan</button>
</div>
</div><!-- payment --><div id="payPop" class="overlay">
<div class="popup">
<div onclick="tutup()">✕</div>
<input id="no" placeholder="No Payment">
<button onclick="simpanPayment()">Simpan</button>
</div>
</div><!-- sawer --><div id="sawer" class="overlay">
<div class="popup">
<div onclick="tutup()">✕</div>
<a href="https://saweria.co/F3br1z" target="_blank">
<button>Kirim Saweran 💸</button>
</a>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
authDomain:"berkoar-6fc3a.firebaseapp.com",
projectId:"berkoar-6fc3a"
});

const db = getFirestore(app);

window.simpanAkun=async()=>{
let id=document.getElementById("id").value;
let server=document.getElementById("server").value;
let file=document.getElementById("foto").files[0];
if(!id||!server||!file)return alert("Isi semua");

let r=new FileReader();
r.onload=async e=>{
await addDoc(collection(db,"akun"),{
id,server,kode:id+server,foto:e.target.result
});
location.href="akun.html";
};
r.readAsDataURL(file);
}

window.simpanPayment=async()=>{
let no=document.getElementById("no").value;
if(!no)return alert("Isi dulu");
await addDoc(collection(db,"payment"),{
nomor:no,kode:no.replace(/\s/g,'')
});
location.href="payment.html";
}

window.tampil=id=>{
document.querySelectorAll(".overlay").forEach(e=>e.style.display="none");
document.getElementById(id).style.display="flex";
}

window.tutup=()=>document.querySelectorAll(".overlay").forEach(e=>e.style.display="none");
window.bukaAkun=()=>location.href="akun.html";
window.bukaPayment=()=>location.href="payment.html";
window.bukaSawer=()=>tampil("sawer");
</script></body>
</html>
