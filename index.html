<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Berkoar</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: monospace;
  color: white;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.container {
  text-align: center;
  margin-top: 60px;
}

.title {
  font-size: 28px;
  margin-bottom: 30px;
}

.box {
  border: 2px solid #888;
  border-radius: 12px;
  padding: 20px;
  margin: 15px auto;
  width: 80%;
  max-width: 400px;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.25s ease;
}

.box:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.08);
}

.box:active {
  transform: scale(0.95);
}

.info {
  font-size: 12px;
  padding: 20px;
  text-align: center;
}

.divider {
  width: 80%;
  height: 1px;
  background: #444;
  margin: 20px auto;
}

footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-bottom: 80px;
}

.fab {
  position: fixed;
  bottom: 70px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid #888;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  cursor: pointer;
  background: #000;
  transition: 0.3s;
}

.fab:hover {
  transform: scale(1.1) rotate(90deg);
}

/* popup */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
}

.popup {
  width: 85%;
  max-width: 320px;
  background: #111;
  border: 2px solid #888;
  border-radius: 12px;
  padding: 20px;
  animation: zoomIn 0.25s ease;
}

@keyframes zoomIn {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.close {
  text-align: right;
  cursor: pointer;
  font-size:18px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  background: #000;
  border: 1px solid #555;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #222;
  border: 1px solid #888;
  color: white;
  transition: 0.2s;
}

button:hover {
  background:#333;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Ingin Berkoar</div>

  <div class="box" onclick="bukaAkun()">Akun HB</div>
  <div class="box" onclick="bukaPayment()">Payment Tukang HB</div>
  <div class="box" onclick="bukaSawer()">Sawer Admin</div>
</div>

<div class="info">
  <p>WEBSITE INI DI BUAT UNTUK</p>
  <p>MENCARI INFO DAN MENAMBAHKAN DATA AKUN/PAYMENT</p>
  <p>DARI TUKANG HB BIAR KAPOK</p>
</div>

<div class="divider"></div>
<footer>FUHH 2026</footer>

<div class="fab" onclick="bukaPopup()">+</div>

<!-- popup pilihan -->
<div id="popupPilihan" class="overlay">
  <div class="popup">
    <div class="close" onclick="tutup()">✕</div>
    <div class="box" onclick="pilihAkun()">Tambahkan Akun HB</div>
    <div class="box" onclick="pilihPayment()">Tambahkan Payment Tukang HB</div>
  </div>
</div>

<!-- popup akun -->
<div id="popupAkun" class="overlay">
  <div class="popup">
    <div class="close" onclick="kembali()">✕</div>
    <input type="text" id="id" placeholder="ID">
    <input type="text" id="server" placeholder="Server">
    <input type="file" id="foto">
    <button onclick="simpanAkun()">Simpan</button>
  </div>
</div>

<!-- popup payment -->
<div id="popupPayment" class="overlay">
  <div class="popup">
    <div class="close" onclick="kembali()">✕</div>
    <input type="text" id="noPayment" placeholder="Nama & No E-Wallet / Rekening">
    <button onclick="simpanPayment()">Simpan</button>
  </div>
</div>

<!-- popup sawer -->
<div id="popupSawer" class="overlay">
  <div class="popup">
    <div class="close" onclick="tutup()">✕</div>

    <p style="text-align:center;">SUPPORT ADMIN</p>
<p style="text-align:center;">KLIK TOMBOL DI BAWAH YA GUYSS MAKASIHHH</p>
    <a href="https://saweria.co/F3br1z" target="_blank">
      <button style="margin-top:15px;">Kirim Saweran 💸</button>
    </a>

  </div>
</div>

<script>
let lastPopup = null;

function tampil(id) {
  document.querySelectorAll(".overlay").forEach(e => e.style.display = "none");
  document.getElementById(id).style.display = "flex";
}

function bukaPopup() {
  lastPopup = null;
  tampil("popupPilihan");
}

function pilihAkun() {
  lastPopup = "popupPilihan";
  tampil("popupAkun");
}

function pilihPayment() {
  lastPopup = "popupPilihan";
  tampil("popupPayment");
}

function kembali() {
  tampil(lastPopup);
}

function tutup() {
  document.querySelectorAll(".overlay").forEach(e => e.style.display = "none");
}

function bukaSawer() {
  tampil("popupSawer");
}

function simpanAkun() {
  let id = document.getElementById("id").value;
  let server = document.getElementById("server").value;
  let file = document.getElementById("foto").files[0];

  if (!id || !server || !file) return alert("Isi semua!");

  let reader = new FileReader();
  reader.onload = function(e) {
    let data = {
      id: id,
      server: server,
      kode: id + server,
      foto: e.target.result
    };

    let semua = JSON.parse(localStorage.getItem("akunList")) || [];
    semua.push(data);
    localStorage.setItem("akunList", JSON.stringify(semua));

    window.location.href = "akun.html";
  };

  reader.readAsDataURL(file);
}

function simpanPayment() {
  let no = document.getElementById("noPayment").value;

  if (!no) return alert("Isi dulu!");

  let data = {
    nomor: no,
    kode: no.replace(/\s/g,'')
  };

  let semua = JSON.parse(localStorage.getItem("paymentList")) || [];
  semua.push(data);
  localStorage.setItem("paymentList", JSON.stringify(semua));

  window.location.href = "payment.html";
}

function bukaAkun() {
  window.location.href = "akun.html";
}

function bukaPayment() {
  window.location.href = "payment.html";
}
</script>

</body>
</html>
