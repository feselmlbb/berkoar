<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berkoar</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: monospace;
  color: white;
}

.container {text-align:center;margin-top:60px;}
.title {font-size:28px;}
#jamKeren {font-size:13px;margin:10px;}
.box {
  border:2px solid #888;
  border-radius:12px;
  padding:20px;
  margin:15px auto;
  width:80%;
  max-width:400px;
  cursor:pointer;
}
.fab {
  position:fixed;bottom:40px;right:20px;
  width:55px;height:55px;border-radius:50%;
  border:2px solid #888;
  display:flex;justify-content:center;align-items:center;
  font-size:28px;cursor:pointer;
}
  .overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background: rgba(0,0,0,0.7);
}

/* FIX UTAMA */
.popup {
  position: relative;
  width: 90%;
  max-width: 300px;
  background:#111;
  border:2px solid #888;
  border-radius:12px;
  padding:20px;

  /* 🔥 ini bikin beneran center */
  margin: auto;
}
input,button {
  width:100%;padding:10px;margin:8px 0;
  background:#000;border:1px solid #555;color:white;
}
#loading {
  display:none;position:fixed;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;align-items:center;flex-direction:column;
}
.spinner {
  width:50px;height:50px;border:5px solid #555;
  border-top:5px solid white;border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="container">
  <div class="title">Ingin Berkoar</div>
  <div id="jamKeren"></div>

  <div class="box" onclick="bukaAkun()">Akun HB</div>
  <div class="box" onclick="bukaPayment()">Payment</div>
</div>

<div class="fab" onclick="tampil('popupPilihan')">+</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Mengirim...</p>
</div>

<div id="popupPilihan" class="overlay">
  <div class="popup">
    <span onclick="tutup()">✖</span>
    <div class="box" onclick="tampil('popupAkun')">Tambah Akun</div>
    <div class="box" onclick="tampil('popupPayment')">Tambah Payment</div>
  </div>
</div>

<div id="popupAkun" class="overlay">
  <div class="popup">
    <span onclick="tutup()">✖</span>
    <input id="id" placeholder="ID">
    <input id="server" placeholder="Server">
    <input type="file" id="foto">
    <button onclick="simpanAkun()">Simpan</button>
  </div>
</div>

<div id="popupPayment" class="overlay">
  <div class="popup">
    <span onclick="tutup()">✖</span>
    <input id="noPayment" placeholder="Nomor">
    <button onclick="simpanPayment()">Simpan</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  projectId:"berkoar-6fc3a"
});
const db = getFirestore(app);

window.tampil=id=>{
  document.querySelectorAll(".overlay").forEach(e=>e.style.display="none");
  document.getElementById(id).style.display="flex";
}
window.tutup=()=>{
  document.querySelectorAll(".overlay").forEach(e=>e.style.display="none");
}

window.simpanAkun = function(){
  let id = document.getElementById("id").value;
  let server = document.getElementById("server").value;
  let file = document.getElementById("foto").files[0];

  if(!id || !server || !file) return;

  document.getElementById("loading").style.display="flex";

  let reader = new FileReader();
  reader.onload = async e=>{
    await addDoc(collection(db,"akun"),{
      id, server,
      kode:id+server,
      foto:e.target.result
    });
    location.href="akun.html";
  };
  reader.readAsDataURL(file);
}

window.simpanPayment = async function(){
  let no = document.getElementById("noPayment").value;
  if(!no) return;

  await addDoc(collection(db,"payment"),{
    nomor:no,
    kode:no.replace(/\s/g,'')
  });

  location.href="payment.html";
}

window.bukaAkun=()=>location.href="akun.html";
window.bukaPayment=()=>location.href="payment.html";
</script>

</body>
</html>
